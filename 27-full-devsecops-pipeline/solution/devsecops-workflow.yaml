name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go / Node / Java (Depends on project)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies & Unit Test
        run: |
          echo "Running tests..."
          # npm install && npm test

      - name: Static Application Security Testing (SAST) - SonarCloud
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true # For demo purposes

      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.sha }} .

      - name: Container Image Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to Container Registry
        run: |
          echo "Pushing image to registry..."
          # echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          # docker push my-app:${{ github.sha }}

      - name: Deploy to Kubernetes
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply K8s Manifests
        run: |
          # sed -i 's/IMAGE_TAG/${{ github.sha }}/g' k8s/deployment.yaml
          # kubectl apply -f k8s/
          echo "Deployed to Kubernetes successfully."
